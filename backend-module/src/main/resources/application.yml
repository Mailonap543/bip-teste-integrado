spring:
  datasource:
    url: jdbc:h2:mem:bipdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

# JWT Configuration
jwt:
  secret: bip-teste-integrado-secret-key-must-be-at-least-256-bits-long-for-hs256
  access-token-validity: 3600000
  refresh-token-validity: 86400000

# Server
server:
  port: 8080

# Actuator (Monitoring)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
  default-produces-media-type: application/json

# Logging
logging:
  level:
    com.example.backend: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# App config
app:
  ejb:
    enabled: false
