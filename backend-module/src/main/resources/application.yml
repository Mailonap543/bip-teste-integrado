spring:
  datasource:
    url: jdbc:h2:mem:bipdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true
  h2:
    console:
      enabled: true
      path: /h2-console
  cache:
    type: simple
    cache-names: beneficios,usuarios

# JWT Configuration
jwt:
  secret: bip-teste-integrado-secret-key-must-be-at-least-256-bits-long-for-hs256
  access-token-validity: 3600000
  refresh-token-validity: 86400000

# Server
server:
  port: 8080
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
    min-response-size: 1024
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  tomcat:
    max-http-form-post-size: 5MB

# Actuator (Monitoring)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers,mappings,env
  endpoint:
    health:
      show-details: always
    loggers:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: bip-beneficios

# Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
  default-produces-media-type: application/json

# Logging
logging:
  level:
    com.example.backend: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: DEBUG
    com.example.backend.aspect: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# App config
app:
  ejb:
    enabled: false
