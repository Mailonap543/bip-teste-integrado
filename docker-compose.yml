version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: bip-postgres
    environment:
      POSTGRES_DB: bipdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bip-network

  backend:
    build:
      context: ./backend-module
      dockerfile: Dockerfile
    container_name: bip-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bipdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_PROFILES_ACTIVE: prod
      JWT_SECRET: bip-teste-integrado-secret-key-must-be-at-least-256-bits-long-for-hs256
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - bip-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bip-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - bip-network

volumes:
  postgres_data:

networks:
  bip-network:
    driver: bridge
