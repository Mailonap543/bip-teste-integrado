<div class="list-container">
  <h2>Gerenciar Benefícios</h2>

  <div *ngIf="mensagem" class="alert" [ngClass]="{'alert-sucesso': tipoMensagem === 'sucesso', 'alert-erro': tipoMensagem === 'erro'}">
    {{ mensagem }}
  </div>

  <div class="actions-bar">
    <button class="btn btn-primary" (click)="novoBeneficio()" *ngIf="!beneficioSelecionado">
      + Novo Benefício
    </button>
  </div>

  <div *ngIf="beneficioSelecionado" class="form-section">
    <app-beneficio-form
      [beneficio]="beneficioSelecionado"
      (salvarBeneficio)="salvarBeneficioEvent($event)"
      (cancelar)="cancelarEvent()">
    </app-beneficio-form>
  </div>

  <div *ngIf="carregando" class="loading">
    <span class="spinner"></span> Carregando...
  </div>

  <table *ngIf="!beneficioSelecionado && !carregando" class="table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Titular</th>
        <th>Saldo</th>
        <th>Ativa</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let b of beneficios">
        <td>{{ b.id }}</td>
        <td>{{ b.titular }}</td>
        <td class="saldo">{{ b.saldo | currency:'BRL':'symbol':'1.2-2' }}</td>
        <td>
          <span class="badge" [ngClass]="{'badge-ativa': b.ativa, 'badge-inativa': !b.ativa}">
            {{ b.ativa ? 'Ativa' : 'Inativa' }}
          </span>
        </td>
        <td class="actions">
          <button class="btn btn-sm btn-editar" (click)="editar(b)" title="Editar">
            Editar
          </button>
          <button class="btn btn-sm btn-excluir" (click)="excluir(b.id)" title="Excluir">
            Excluir
          </button>
        </td>
      </tr>
    </tbody>
  </table>

  <div *ngIf="!carregando && beneficios.length === 0 && !beneficioSelecionado" class="empty-state">
    <p>Nenhum benefício cadastrado.</p>
  </div>
</div>
